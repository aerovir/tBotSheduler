<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание слотов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }
        h1 { font-size: 20px; margin-bottom: 16px; }
        h2 { font-size: 16px; margin: 16px 0 8px; }
        .section { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 4px; color: var(--tg-theme-hint-color, #666); }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
        }
        .date-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            margin: 8px 0;
        }
        .date-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
        }
        .date-item input { width: auto; }
        .date-item label { margin: 0; cursor: pointer; font-size: 14px; }
        .time-range {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .time-range select { flex: 1; }
        .time-range span { font-size: 14px; }
        .selected-dates { margin: 8px 0; }
        .selected-date {
            display: inline-block;
            padding: 4px 10px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border-radius: 12px;
            font-size: 12px;
            margin: 2px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            margin-top: 16px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .summary {
            margin-top: 16px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>📅 Создание слотов</h1>

    <div class="section">
        <h2>1. Выберите даты</h2>
        <div class="date-grid" id="dateGrid"></div>
        <div class="selected-dates" id="selectedDates"></div>
    </div>

    <div class="section">
        <h2>2. Время начала и конца</h2>
        <div class="time-range">
            <div style="flex:1">
                <label>Начало</label>
                <select id="startHour">
                    ${Array.from({length: 12}, (_, i) => `<option value="${i + 8}">${String(i + 8).padStart(2, '0')}:00</option>`).join('')}
                </select>
            </div>
            <span>—</span>
            <div style="flex:1">
                <label>Конец</label>
                <select id="endHour">
                    ${Array.from({length: 12}, (_, i) => `<option value="${i + 9}" ${i === 11 ? 'selected' : ''}>${String(i + 9).padStart(2, '0')}:00</option>`).join('')}
                </select>
            </div>
        </div>
    </div>

    <div class="summary" id="summary">
        Выбрано дат: <span id="dateCount">0</span><br>
        Слотов на дату: <span id="slotCount">0</span><br>
        <b>Всего слотов: <span id="totalCount">0</span></b>
    </div>

    <button class="btn" id="submitBtn" disabled>✅ Создать слоты</button>

    <script>
        const Telegram = window.Telegram?.WebApp;
        if (!Telegram) {
            document.body.innerHTML = '<p style="padding:20px">❌ Это приложение доступно только внутри Telegram</p>';
            throw new Error('Not in Telegram');
        }
        Telegram.expand();

        // State
        const selectedDates = new Set();
        const startHourEl = document.getElementById('startHour');
        const endHourEl = document.getElementById('endHour');
        const dateGrid = document.getElementById('dateGrid');
        const selectedDatesEl = document.getElementById('selectedDates');
        const dateCountEl = document.getElementById('dateCount');
        const slotCountEl = document.getElementById('slotCount');
        const totalCountEl = document.getElementById('totalCount');
        const submitBtn = document.getElementById('submitBtn');

        // Generate next 14 days
        function generateDates() {
            const today = new Date();
            for (let i = 0; i < 14; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                const dayName = d.toLocaleDateString('ru-RU', { weekday: 'short' });
                const dayMonth = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

                const div = document.createElement('div');
                div.className = 'date-item';
                div.innerHTML = `
                    <input type="checkbox" id="date-${dateStr}" value="${dateStr}">
                    <label for="date-${dateStr}">${dayName}, ${dayMonth}</label>
                `;
                div.querySelector('input').addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedDates.add(dateStr);
                    } else {
                        selectedDates.delete(dateStr);
                    }
                    updateUI();
                });
                dateGrid.appendChild(div);
            }
        }

        function updateUI() {
            const dates = [...selectedDates].sort();
            // Update selected dates display
            selectedDatesEl.innerHTML = dates.map(d => {
                const parts = d.split('-');
                return `<span class="selected-date">${parts[2]}.${parts[1]}</span>`;
            }).join('');

            // Calculate slots
            const start = parseInt(startHourEl.value);
            const end = parseInt(endHourEl.value);
            const slotsPerDay = Math.max(0, end - start);
            const totalSlots = dates.length * slotsPerDay;

            dateCountEl.textContent = dates.length;
            slotCountEl.textContent = slotsPerDay;
            totalCountEl.textContent = totalSlots;
            submitBtn.disabled = dates.length === 0 || slotsPerDay <= 0;
        }

        // Update on time change
        startHourEl.addEventListener('change', updateUI);
        endHourEl.addEventListener('change', updateUI);

        // Submit
        submitBtn.addEventListener('click', async () => {
            const start = parseInt(startHourEl.value);
            const end = parseInt(endHourEl.value);

            const slots = [];
            for (const dateStr of [...selectedDates].sort()) {
                for (let h = start; h < end; h++) {
                    slots.push({
                        date: dateStr,
                        start_time: `${String(h).padStart(2, '0')}:00`,
                        end_time: `${String(h + 1).padStart(2, '0')}:00`,
                    });
                }
            }

            // Send data back to bot
            Telegram.sendData(JSON.stringify({
                action: 'create_slots',
                slots: slots,
            }));
        });

        generateDates();
        updateUI();
    </script>
</body>
</html>
